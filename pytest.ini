[pytest]
markers =
    live_github: uses real GitHub API (set GITHUB_TOKEN)
    live_groq: uses real Groq API (set GROQ_API_KEY)
    live_stack: full orchestrator against real GitHub + Groq (set RUN_LIVE_STACK=1 plus tokens)
    perfect_live: unmocked GitHub/FastAPI and optional full Groq phases (set SCOUT_PERFECT_LIVE=1)
