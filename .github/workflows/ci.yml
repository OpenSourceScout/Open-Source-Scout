name: CI Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  backend-test:
    runs-on: ubuntu-latest
    env:
      # Secrets required for the backend
      GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      NEON_DATABASE_URL: ${{ secrets.NEON_DATABASE_URL }}
      AUTH_JWT_SECRET: ${{ secrets.AUTH_JWT_SECRET }}

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Install uv
      uses: astral-sh/setup-uv@v5
      with:
        version: "latest"

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"

    - name: Install backend dependencies
      run: uv sync

    - name: Run Ruff (Linting)
      run: uv run ruff check .
      continue-on-error: true # Continue on error as it might not be fully compliant yet

    - name: Run Pytest
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
      run: uv run pytest

  frontend-build:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ./frontend

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: "20"
        cache: 'npm'
        cache-dependency-path: './frontend/package-lock.json'

    - name: Install frontend dependencies
      run: npm ci

    - name: Run ESLint
      run: npx eslint --ext .js,.jsx .
      continue-on-error: true

    - name: Unit tests (Vitest)
      run: npm run test

    - name: Build frontend
      run: npm run build

  frontend-e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: ./frontend

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: "20"
        cache: 'npm'
        cache-dependency-path: './frontend/package-lock.json'

    - name: Install frontend dependencies
      run: npm ci

    - name: Install Playwright Chromium
      run: npx playwright install --with-deps chromium

    - name: E2E tests (editor view / edit / diff / push)
      run: npm run test:e2e

  live-stack:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
      RUN_LIVE_STACK: "1"
    steps:
    - uses: actions/checkout@v4
    - uses: astral-sh/setup-uv@v5
      with:
        version: "latest"
    - uses: actions/setup-python@v5
      with:
        python-version: "3.11"
    - name: Install dependencies
      run: uv sync
    - name: Full-stack live orchestrator smoke
      run: uv run pytest tests/test_live_api_smoke.py::test_live_orchestrator_phase1_real_apis -v --tb=short

  perfect-live:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 35
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
      SCOUT_PERFECT_LIVE: "1"
    steps:
    - uses: actions/checkout@v4
    - uses: astral-sh/setup-uv@v5
      with:
        version: "latest"
    - uses: actions/setup-python@v5
      with:
        python-version: "3.11"
    - name: Install backend
      run: uv sync
    - name: Unmocked GitHub + FastAPI + full Groq phases (slide)
      run: uv run pytest tests/test_perfect_live_integration.py -v --tb=short
    - uses: actions/setup-node@v4
      with:
        node-version: "20"
        cache: "npm"
        cache-dependency-path: "./frontend/package-lock.json"
    - name: Live Playwright — frontend + backend + GitHub (no API mocks)
      run: |
        cd frontend && npm ci && cd ..
        uv run uvicorn app.api:app --host 127.0.0.1 --port 8001 &
        sleep 6
        curl -sf http://127.0.0.1:8001/api/health
        cd frontend && npm run dev -- --host 127.0.0.1 --port 5173 --strictPort &
        sleep 15
        curl -sf http://127.0.0.1:5173/ >/dev/null
        cd frontend && E2E_LIVE_BACKEND=1 npm run test:e2e:live
